# ============================================================
# Nanping Nginx 配置
# 放到 /etc/nginx/sites-available/nanping 然后 ln -s 到 sites-enabled
#
# 域名：
#   nanping.eznju.com / nanping.site          → 前端
#   npapi.eznju.com    / api.nanping.site      → API 后端
#
# SSL 证书：首次部署后运行：
#   certbot --nginx -d nanping.eznju.com -d nanping.site -d npapi.eznju.com -d api.nanping.site
# ============================================================

# ---- 限流区域定义 ----
# ---- 日志格式（含响应时间） ----
log_format nanping '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time';

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ============================================================
# 前端：nanping.eznju.com + nanping.site
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name nanping.eznju.com nanping.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nanping.eznju.com nanping.site;

    # SSL 证书（certbot 管理，多域名共用）
    ssl_certificate     /etc/letsencrypt/live/nanping.eznju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nanping.eznju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/nanping-frontend-access.log nanping;
    error_log  /var/log/nginx/nanping-frontend-error.log warn;

    root /opt/nanping/frontend;
    index index.html;

    include /etc/nginx/mime.types;
    types { font/woff2 woff2; }

    # 静态资源强缓存（不含 zip，插件需要随更新即时生效）
    location ~* \.(css|js|png|jpg|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 管理后台代理到后端
    location ^~ /admin {
        proxy_pass http://127.0.0.1:8000/admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'http://nanping.eznju.com' 'https://nanping.eznju.com';
    }

    location ^~ /statics/ {
        proxy_pass http://127.0.0.1:8000/admin/statics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

# ============================================================
# API：npapi.eznju.com + api.nanping.site
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name npapi.eznju.com api.nanping.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name npapi.eznju.com api.nanping.site;

    ssl_certificate     /etc/letsencrypt/live/nanping.eznju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nanping.eznju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    access_log /var/log/nginx/nanping-api-access.log nanping;
    error_log  /var/log/nginx/nanping-api-error.log warn;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        limit_req zone=api_limit burst=10 nodelay;
    }

    location /extension/ {
        alias /opt/nanping/extension/;
        add_header Access-Control-Allow-Origin "https://xk.nju.edu.cn";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        expires 1h;
    }
}
