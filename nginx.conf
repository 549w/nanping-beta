# ============================================================
# Nanping Nginx 配置（服务器部署参考）
# 放到 /etc/nginx/sites-available/nanping 然后 ln -s 到 sites-enabled
# ============================================================

# ---- 限流区域定义 ----
# ---- 日志格式（含响应时间） ----
log_format nanping '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time';

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ============================================================
# 前端：nanping.eznju.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name nanping.eznju.com;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nanping.eznju.com;

    # SSL 证书（由 certbot 管理）
    ssl_certificate     /etc/letsencrypt/live/nanping.eznju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nanping.eznju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/nanping-frontend-access.log nanping;
    error_log  /var/log/nginx/nanping-frontend-error.log warn;

    root /opt/nanping/frontend;
    index index.html;

    # 静态资源强缓存（CSS/JS/图片/字体/zip）
    location ~* \.(css|js|png|jpg|ico|svg|woff2|zip)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 管理后台代理到后端（^~ 防止被下面正则 location 拦截）
    location ^~ /admin {
        proxy_pass http://127.0.0.1:8000/admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁止后端压缩，否则 sub_filter 无法替换响应内容
        proxy_set_header Accept-Encoding "";

        # SQLAdmin 生成 http:// URL，nginx 改写为 https://
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'http://nanping.eznju.com' 'https://nanping.eznju.com';
    }

    # 管理后台静态资源（SQLAdmin 将其挂载在 /admin/statics/ 下）
    location ^~ /statics/ {
        proxy_pass http://127.0.0.1:8000/admin/statics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 默认 fallback（支持无 .html 后缀的 clean URL）
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 自定义 404 页面
    error_page 404 /404.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

# ============================================================
# API：npapi.eznju.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name npapi.eznju.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name npapi.eznju.com;

    ssl_certificate     /etc/letsencrypt/live/nanping.eznju.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nanping.eznju.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    access_log /var/log/nginx/nanping-api-access.log nanping;
    error_log  /var/log/nginx/nanping-api-error.log warn;

    # ---- 代理通用设置 ----
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;

    # 上传 body 大小限制（批量匹配接口可能较大）
    client_max_body_size 2m;

    # ---- API 反向代理到 Docker 后端 ----
    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    # 认证接口额外限流
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        limit_req zone=api_limit burst=10 nodelay;
    }

    # ---- 扩展静态文件（Chrome 插件从这里加载 content_dev.js）----
    location /extension/ {
        alias /opt/nanping/extension/;
        add_header Access-Control-Allow-Origin "https://xk.nju.edu.cn";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        expires 1h;
    }
}
