<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南评 Nanping</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght;400;500;700&family=Noto+Serif+SC:wght;500;700;900&display=swap">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV-START -->
<nav class="nanping-nav">
  <div class="nav-brand">
    <a href="/">南评 Nanping</a>
  </div>
  <div class="nav-links" id="nav-auth-links">
    <a href="/">首页</a>
    <a href="/about">关于</a>
    <a href="/login">登录</a>
    <a href="/register">注册</a>
  </div>
</nav>
<!-- NAV-END -->

<main class="container">
  <!-- Hero -->
  <section class="hero">
    <h1>南评 Nanping</h1>
    <p>NJU 一站式选课助手。搜索课程，以查看评价或撰写评价。</p>
  </section>

  <!-- 插件推广贴纸 -->
  <div class="extension-sticker">
    <span class="material-symbols-outlined">extension</span>
    <div class="sticker-content">
      <strong>最佳体验：</strong><a href="/download">安装浏览器插件</a>，在选课页面一键查看评分与评价。效果示例如下
    </div>
    <a class="sticker-btn" href="/download">立即安装</a>
  </div>

  <p style="text-align:center; margin: 0.5rem 0 1.5rem;">
    <img src="screenshots/example.png" alt="插件效果示例" style="max-width:100%; max-height:360px; border-radius:8px; border:1px solid #ddd; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  </p>

  <!-- 搜索表单 -->
  <section class="search-section">
    <p class="info-links">
      <a href="https://github.com/549w/nanping" target="_blank">项目主页</a>
      &nbsp;·&nbsp; QQ 群：<strong>1048569521</strong>，畅所欲言 / 反馈问题 / 参与测试 / 交流设计和技术等 
    </p>
    <form id="search-form" autocomplete="off">
      <input type="text" name="code" placeholder="课程号（可选），如 25000700" aria-label="课程号">
      <input type="text" name="name" placeholder="课程名称（可选）" aria-label="课程名称">
      <input type="text" name="teacher" placeholder="授课教师（可选）" aria-label="授课教师">
      <button type="submit">搜索</button>
    </form>
  </section>

  <!-- 搜索结果 -->
  <section id="results-section">
    <div class="empty-state" id="initial-state">
      <div class="empty-icon"><span class="material-symbols-outlined">search</span></div>
      <p>请输入搜索条件开始搜索课程</p>
    </div>
  </section>
</main>

<footer class="nanping-footer">
  <a href="/about">关于本站</a>
  <span style="margin: 0 0.5rem; color: var(--pico-muted-color);">·</span>
  <a href="/terms">用户协议</a>
  <span style="margin: 0 0.5rem; color: var(--pico-muted-color);">·</span>
  <a href="https://beian.miit.gov.cn/" target="_blank">苏ICP备2026015844号-3</a>
</footer>

<script type="module">
import { escapeHtml, renderStars, renderPagination, showToast } from "./js/utils.js";
import { updateNav } from "./js/auth.js";
import { searchCourses } from "./js/api.js";

// ---- 页面状态 ----
let currentPage = 1;
let currentPageSize = 20;
let lastSearchParams = null;

// ---- 初始化 ----
updateNav();

// ---- 搜索表单 ----
const searchForm = document.getElementById("search-form");
const resultsSection = document.getElementById("results-section");

searchForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(searchForm);
  const code = formData.get("code").trim();
  const name = formData.get("name").trim();
  const teacher = formData.get("teacher").trim();

  // 客户端校验：至少一个搜索条件
  if (!code && !name && !teacher) {
    showToast("至少填写一个搜索条件，才能搜索哦。", "error");
    return;
  }

  lastSearchParams = { code, name, teacher };
  currentPage = 1;
  await doSearch();
});

// ---- 执行搜索 ----
async function doSearch() {
  const submitBtn = searchForm.querySelector("button[type=submit]");
  submitBtn.disabled = true;
  submitBtn.textContent = "搜索中...";

  resultsSection.innerHTML = `
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <p>搜索中...</p>
    </div>
  `;

  const result = await searchCourses({
    ...lastSearchParams,
    page: currentPage,
    pageSize: currentPageSize,
  });

  submitBtn.disabled = false;
  submitBtn.textContent = "搜索";

  if (!result.ok) {
    resultsSection.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><span class="material-symbols-outlined">warning</span></div>
        <p>${escapeHtml(result.error || "搜索失败，请重试。如果问题持续存在，请联系作者。")}</p>
      </div>
    `;
    showToast(result.error || "搜索失败", "error");
    return;
  }

  renderResults(result.data);
}

// ---- 渲染结果 ----
function renderResults(data) {
  const { items, total, page, page_size } = data;

  if (items.length === 0) {
    resultsSection.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><span class="material-symbols-outlined">sentiment_dissatisfied</span></div>
        <p>未找到相关课程，请尝试其他搜索条件</p>
      </div>
    `;
    return;
  }

  let html = '<div class="course-grid">';
  for (const course of items) {
    const courseJson = escapeHtml(JSON.stringify({
      id: course.id,
      code: course.code,
      name: course.name,
      teacher: course.teacher,
      department: course.department,
      credits: course.credits,
      avg_rating: course.avg_rating,
      review_count: course.review_count,
    }));
    html += `
      <div class="course-card" data-course='${courseJson}' tabindex="0" role="link">
        <div class="card-code">${escapeHtml(course.code)}</div>
        <div class="card-name">${escapeHtml(course.name)}</div>
        <div class="card-meta">
          教师：${escapeHtml(course.teacher)}
          ${course.department ? ` · ${escapeHtml(course.department)}` : ""}
          ${course.credits != null ? ` · ${course.credits} 学分` : ""}
        </div>
        ${course.semesters?.length ? `<div class="card-semester">最近开课：${escapeHtml(course.semesters[0])}</div>` : ""}
        <div class="card-footer">
          <span>${renderStars(course.avg_rating)} <span class="rating-score">${course.avg_rating != null ? course.avg_rating.toFixed(2) : '-'}</span></span>
          <span class="review-count">${course.review_count} 条评价</span>
        </div>
      </div>`;
  }
  html += "</div>";

  // 分页
  html += renderPagination(page, page_size, total);

  resultsSection.innerHTML = html;

  // 绑定课程卡片点击
  resultsSection.querySelectorAll(".course-card").forEach((card) => {
    const clickHandler = () => {
      const courseData = JSON.parse(card.dataset.course);
      sessionStorage.setItem(`course_${courseData.id}`, JSON.stringify(courseData));
      window.location.href = `/course?from=search&id=${courseData.id}`;
    };
    card.addEventListener("click", clickHandler);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        clickHandler();
      }
    });
  });

  // 绑定分页按钮
  resultsSection.querySelectorAll(".pagination button[data-page]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const newPage = parseInt(btn.dataset.page, 10);
      if (newPage < 1 || newPage > Math.ceil(total / page_size)) return;
      currentPage = newPage;
      resultsSection.scrollIntoView({ behavior: "smooth" });
      await doSearch();
    });
  });
}
</script>

</body>
</html>
