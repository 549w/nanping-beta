# ============================================================
# Nanping Docker Compose
# 后端 + PostgreSQL，前端由主机 Nginx 直接 serve
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: nanping-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nanping
      POSTGRES_PASSWORD: nanping
      POSTGRES_DB: nanping
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanping-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    ports:
      - "127.0.0.1:8000:8000"

    env_file:
      - .env.production

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
